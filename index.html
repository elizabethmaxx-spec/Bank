    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sber Toy Notify Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: #000; color: white; overflow: hidden; }

        /* УВЕДОМЛЕНИЯ */
        #push-notif {
            position: fixed; top: -100px; left: 10px; right: 10px; 
            background: rgba(30,30,30,0.95); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 20px; border: 1px solid #333;
            display: flex; align-items: center; gap: 12px; z-index: 2000;
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #push-notif.show { top: 15px; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
        .screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); z-index: -1; }
        .active { display: flex; }

        /* ФОН ВХОДА ИЗ СКРИНШОТА */
        #auth-screen { background: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80') center/cover; }

        /* ПИН-ТОЧКИ (5 ШТУК) */
        .pin-dots { display: flex; gap: 18px; margin: 40px 0; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .pin-dot.active { background: white; border-color: white; transform: scale(1.2); }

        /* ЦИФРОВАЯ ПАНЕЛЬ */
        .numpad { display: grid; grid-template-columns: repeat(3, 85px); gap: 20px; }
        .num-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; height: 85px; color: white; font-size: 28px; cursor: pointer; transition: 0.2s; }
        .num-btn:active { background: rgba(255,255,255,0.3); }

        /* ЭКРАН РЕГИСТРАЦИИ */
        .reg-container { width: 100%; max-width: 320px; text-align: center; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        input { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 18px; color: white; font-size: 16px; width: 100%; margin-bottom: 12px; }
        .btn-green { background: #21a038; border: none; padding: 20px; border-radius: 18px; color: white; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #app-screen { background: #000; overflow-y: auto; padding-bottom: 100px; }
        .header { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1c1c1e; }
        .balance-card { background: #1c1c1e; border-radius: 24px; padding: 25px; margin: 20px; border: 1px solid #2c2c2e; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10,10,10,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .nav-link { text-align: center; color: #8e8e93; font-size: 10px; text-decoration: none; flex: 1; }
        .nav-link.active { color: #21a038; }
        .nav-link i { display: block; font-size: 24px; font-style: normal; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="push-notif">
        <div style="width:45px; height:45px; background:#21a038; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">💰</div>
        <div>
            <b id="p-title">СберБанк</b>
            <div id="p-text" style="font-size:13px; opacity:0.8;"></div>
        </div>
    </div>

    <div id="auth-screen" class="screen active">
        <div style="font-size:20px; font-weight:600; letter-spacing: 0.5px;">Введите пароль</div>
        <div class="pin-dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad" id="auth-pad"></div>
    </div>

    <div id="reg-screen" class="screen">
        <div class="reg-container">
            <h2 style="color:#21a038; font-size: 28px; margin-bottom: 10px;">Новый аккаунт</h2>
            <p style="opacity:0.6; margin-bottom:30px;">Привяжите имя и номер для уведомлений</p>
            <input type="text" id="r-name" placeholder="Как вас зовут?">
            <input type="tel" id="r-phone" placeholder="+7 (___) ___-__-__">
            <button class="btn-green" onclick="completeRegistration()">СОЗДАТЬ СЧЕТ</button>
            <p style="margin-top: 20px; font-size: 12px; color: #555;">ПИН: <span id="display-pin"></span></p>
        </div>
    </div>

    <div id="app-screen" class="screen" style="justify-content: flex-start; padding: 0;">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; background:#21a038; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">S</div>
                <b id="user-name-display" style="font-size: 18px;">...</b>
            </div>
            <div onclick="location.reload()" style="font-size: 20px; cursor:pointer;">🚪</div>
        </div>

        <div class="balance-card">
            <div style="color:#8e8e93; font-size:13px; margin-bottom: 8px;">Мои средства</div>
            <div id="user-balance" style="font-size:36px; font-weight:bold; letter-spacing: -1px;">0 ₽</div>
            <div id="user-phone-display" style="font-size:12px; color:#21a038; margin-top: 15px; opacity: 0.8;">Карта • 9848</div>
        </div>

        <div style="padding:0 25px; width: 100%;">
            <h3 style="margin-bottom: 15px;">Последние операции</h3>
            <div id="transaction-history" style="border-radius:20px; background:#111; min-height: 100px;"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-link active"><i>🏠</i>Главный</div>
            <div class="nav-link" onclick="openScanner()"><i>🔳</i>Платежи</div>
            <div class="nav-link" onclick="openScanner()"><i>💸</i>Переводы</div>
            <div class="nav-link" onclick="alert('Ваш ID (ПИН): ' + currentPin)"><i>👤</i>Профиль</div>
        </div>
    </div>

    <div id="scanner-box" style="position:fixed; inset:0; background:#000; z-index:2001; display:none;">
        <div style="padding:25px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size: 18px;">Оплата по QR</b>
            <span onclick="closeScanner()" style="font-size:28px; cursor:pointer;">✕</span>
        </div>
        <div id="qr-video-reader" style="width:100%;"></div>
    </div>

<script>
    // --- Инициализация Базы (Версия v2) ---
    firebase.initializeApp({databaseURL: "https://sbep-15509-default-rtdb.firebaseio.com"});
    const db = firebase.database();
    const DB_PATH = "bank_v2/users/";

    let currentPin = "";
    let currentUserData = null;
    let qrScanner = null;
    let historyLength = 0;

    // СБОРКА КЛАВИАТУРЫ
    const padElement = document.getElementById('auth-pad');
    [1,2,3,4,5,6,7,8,9,'?',0,'⌫'].forEach(val => {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.innerText = val;
        btn.onclick = () => {
            if(val === '⌫') currentPin = currentPin.slice(0,-1);
            else if(val === '?') alert("ПИН-код — это ваш пароль из 5 цифр.");
            else if(currentPin.length < 5) currentPin += val;
            
            updateDots();
            if(currentPin.length === 5) processAuth();
        };
        padElement.appendChild(btn);
    });

    function updateDots() {
        document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('active', i < currentPin.length));
    }

    // ЛОГИКА ВХОДА И ПЕРЕКЛЮЧЕНИЯ НА РЕГИСТРАЦИЮ
    async function processAuth() {
        const snapshot = await db.ref(DB_PATH + currentPin).once('value');
        if(snapshot.exists()) {
            currentUserData = snapshot.val();
            launchDashboard();
        } else {
            // ЕСЛИ АККАУНТА НЕТ -> ПОКАЗЫВАЕМ ЭКРАН РЕГИСТРАЦИИ
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('reg-screen').classList.add('active');
            document.getElementById('display-pin').innerText = currentPin;
        }
    }

    // ЗАВЕРШЕНИЕ РЕГИСТРАЦИИ
    async function completeRegistration() {
        const nameInput = document.getElementById('r-name').value;
        const phoneInput = document.getElementById('r-phone').value;
        
        if(!nameInput || !phoneInput) return alert("Пожалуйста, заполните все поля!");

        currentUserData = {
            name: nameInput,
            phone: phoneInput,
            bal: 15000,
            history: [{t: 'Приветственный бонус', a: 15000, d: new Date().toLocaleTimeString()}]
        };

        await db.ref(DB_PATH + currentPin).set(currentUserData);
        launchDashboard();
    }

    // ГЛАВНЫЙ ЭКРАН
    function launchDashboard() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('app-screen').style.display = 'flex';

        // Слушатель изменений в реальном времени
        db.ref(DB_PATH + currentPin).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            // Логика Пуш-уведомлений о переводах
            if(data.history && data.history.length > historyLength && historyLength !== 0) {
                const lastIdx = data.history.length - 1;
                const lastOp = data.history[lastIdx];
                triggerPush(lastOp.a > 0 ? "Пополнение счета" : "Списание", `${lastOp.t}: ${lastOp.a} ₽`);
            }
            historyLength = data.history ? data.history.length : 0;

            // Рендер данных
            document.getElementById('user-name-display').innerText = data.name;
            document.getElementById('user-balance').innerText = data.bal.toLocaleString() + " ₽";
            document.getElementById('user-phone-display').innerText = "Номер: " + data.phone;
            
            document.getElementById('transaction-history').innerHTML = (data.history || []).slice().reverse().map(i => `
                <div style="padding:18px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size:15px; margin-bottom:3px;">${i.t}</div>
                        <div style="font-size:10px; color:#555;">${i.d || 'Сегодня'}</div>
                    </div>
                    <b style="color:${i.a > 0 ? '#21a038' : '#ff4444'}; font-size:16px;">${i.a > 0 ? '+' : ''}${i.a} ₽</b>
                </div>
            `).join('');
            
            currentUserData = data;
        });
    }

    // ФУНКЦИЯ ПУША
    function triggerPush(title, msg) {
        const push = document.getElementById('push-notif');
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-text').innerText = msg;
        push.classList.add('show');
        setTimeout(() => push.classList.remove('show'), 4500);
    }

    // QR И ПЕРЕВОДЫ
    function openScanner() {
        document.getElementById('scanner-box').style.display = 'block';
        qrScanner = new Html5Qrcode("qr-video-reader");
        qrScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 280 }, (text) => {
            closeScanner();
            executeTransfer(text);
        }).catch(() => alert("Ошибка доступа к камере"));
    }

    function closeScanner() {
        if(qrScanner) qrScanner.stop();
        document.getElementById('scanner-box').style.display = 'none';
    }

    async function executeTransfer(targetPin) {
        if(targetPin === currentPin) return alert("Нельзя переводить самому себе!");
        
        const amount = parseFloat(prompt("Введите сумму перевода для ID " + targetPin + ":"));
        if(!amount || amount <= 0 || amount > currentUserData.bal) return alert("Недостаточно средств или неверная сумма!");

        const targetRef = db.ref(DB_PATH + targetPin);
        const tSnap = await targetRef.once('value');
        
        if(!tSnap.exists()) return alert("Пользователь с таким ID не найден!");

        const targetData = tSnap.val();
        const timeStr = new Date().toLocaleTimeString();

        // Обновляем у нас
        currentUserData.bal -= amount;
        currentUserData.history.push({t: 'Перевод игроку ' + targetData.name, a: -amount, d: timeStr});
        await db.ref(DB_PATH + currentPin).update(currentUserData);

        // Обновляем у него
        targetData.bal += amount;
        targetData.history = targetData.history || [];
        targetData.history.push({t: 'Перевод от ' + currentUserData.name, a: amount, d: timeStr});
        await targetRef.update(targetData);

        alert("Успешно отправлено!");
    }
</script>
</body>
</html>
