  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sber Toy Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* УВЕДОМЛЕНИЯ */
        #push {
            position: fixed; top: -100px; left: 10px; right: 10px; 
            background: rgba(35,35,35,0.9); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 20px; border: 1px solid #444;
            display: flex; align-items: center; gap: 12px; z-index: 9999;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        #push.active { top: 15px; }

        /* ЭКРАНЫ */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); z-index: -1; }
        .active-screen { display: flex; }
        #auth-screen { background: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80') center/cover; }

        /* ИНТЕРФЕЙС */
        .pin-dots { display: flex; gap: 15px; margin: 30px 0; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; }
        .pin-dot.fill { background: white; border-color: white; }
        .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .num-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; height: 80px; color: white; font-size: 26px; cursor: pointer; }
        
        input { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 18px; color: white; width: 100%; margin-bottom: 15px; font-size: 16px; }
        .btn-reg { background: #21a038; border: none; padding: 20px; border-radius: 18px; color: white; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }

        #app-screen { background: #000; justify-content: flex-start; padding: 0; }
        .card { background: #1c1c1e; padding: 25px; border-radius: 25px; margin: 20px; width: calc(100% - 40px); border: 1px solid #2c2c2e; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="push">
        <div style="background:#21a038; width:45px; height:45px; border-radius:12px; display:flex; align-items:center; justify-content:center;">🔔</div>
        <div>
            <b id="p-title">СберБанк</b>
            <div id="p-msg" style="font-size:13px; opacity:0.8"></div>
        </div>
    </div>

    <div id="auth-screen" class="screen active-screen">
        <div style="font-size:18px;">Введите пароль</div>
        <div class="pin-dots" id="dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad" id="numpad"></div>
        <div onclick="resetToReg()" style="margin-top:40px; opacity:0.6; font-size:13px;">Не могу войти</div>
    </div>

    <div id="reg-screen" class="screen">
        <h2 style="color:#21a038; margin-bottom:20px;">Регистрация</h2>
        <div style="width:100%; max-width:320px;">
            <input type="text" id="reg-name" placeholder="Ваше имя">
            <input type="tel" id="reg-phone" placeholder="Номер телефона">
            <button class="btn-reg" onclick="completeReg()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div style="width:100%; padding:20px; display:flex; justify-content:space-between; border-bottom:1px solid #1c1c1e;">
            <b id="u-name">Игрок</b>
            <span onclick="location.reload()">🚪</span>
        </div>
        <div class="card">
            <div style="color:#8e8e93; font-size:12px;">Баланс карты • 9848</div>
            <div id="u-bal" style="font-size:34px; font-weight:bold; margin:10px 0;">0 ₽</div>
            <div id="u-phone" style="font-size:11px; color:#21a038;"></div>
        </div>
        <div class="nav">
            <div style="color:#21a038; text-align:center;">🏠<br><small>Главный</small></div>
            <div onclick="alert('ID для перевода: ' + myPin)" style="text-align:center;">👤<br><small>Профиль</small></div>
        </div>
    </div>

<script>
    firebase.initializeApp({databaseURL: "https://sbep-15509-default-rtdb.firebaseio.com"});
    const db = firebase.database();
    let myPin = "";
    let hCount = 0;

    // КЛАВИАТУРА
    const grid = document.getElementById('numpad');
    [1,2,3,4,5,6,7,8,9,'?',0,'⌫'].forEach(v => {
        const b = document.createElement('button');
        b.className = 'num-btn';
        b.innerText = v;
        b.onclick = () => {
            if(v === '⌫') myPin = myPin.slice(0,-1);
            else if(myPin.length < 5 && typeof v === 'number') myPin += v;
            
            const ds = document.querySelectorAll('.pin-dot');
            ds.forEach((d, i) => d.classList.toggle('fill', i < myPin.length));
            
            if(myPin.length === 5) checkAuth();
        };
        grid.appendChild(b);
    });

    async function checkAuth() {
        const s = await db.ref('users_v3/'+myPin).once('value');
        if(s.exists()) {
            startApp();
        } else {
            document.getElementById('auth-screen').classList.remove('active-screen');
            document.getElementById('reg-screen').classList.add('active-screen');
        }
    }

    function resetToReg() {
        myPin = "NEW" + Math.floor(Math.random()*100); // Генерим временный ПИН для регистрации
        document.getElementById('auth-screen').classList.remove('active-screen');
        document.getElementById('reg-screen').classList.add('active-screen');
    }

    async function completeReg() {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        if(!n || !p) return alert("Заполни все поля!");

        // Если сбросили пароль, даем пользователю шанс ввести свой ПИН заново
        if(myPin.includes("NEW")) {
            myPin = prompt("Придумайте ваш новый 5-значный ПИН:");
            if(!myPin || myPin.length !== 5) return alert("ПИН должен быть из 5 цифр!");
        }

        const data = { name: n, phone: p, bal: 15000, history: [{t: 'Открытие счета', a: 15000}] };
        await db.ref('users_v3/'+myPin).set(data);
        startApp();
    }

    function startApp() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('app-screen').classList.add('active-screen');

        db.ref('users_v3/'+myPin).on('value', snap => {
            const val = snap.val();
            if(!val) return;

            // УВЕДОМЛЕНИЕ
            if(val.history && val.history.length > hCount && hCount !== 0) {
                const last = val.history[val.history.length - 1];
                showPush(last.a > 0 ? "Пополнение" : "Списание", `${last.t}: ${last.a} ₽`);
            }
            hCount = val.history ? val.history.length : 0;

            document.getElementById('u-name').innerText = "Привет, " + val.name;
            document.getElementById('u-bal').innerText = val.bal.toLocaleString() + " ₽";
            document.getElementById('u-phone').innerText = "Тел: " + val.phone;
        });
    }

    function showPush(t, m) {
        const p = document.getElementById('push');
        document.getElementById('p-title').innerText = t;
        document.getElementById('p-msg').innerText = m;
        p.classList.add('active');
        setTimeout(() => p.classList.remove('active'), 4000);
    }
</script>
</body>
</html>
