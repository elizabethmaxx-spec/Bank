  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sber Toy Recovery</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 999; }
        .screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); z-index: -1; }
        .active { display: flex; }
        #auth-screen { background: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80') center/cover; }
        .pin-dots { display: flex; gap: 15px; margin: 30px 0; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; }
        .pin-dot.active { background: white; border-color: white; }
        .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .num-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; height: 80px; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        input { background: #1a1a1a; border: 1px solid #333; padding: 18px; border-radius: 15px; color: white; width: 100%; margin-bottom: 10px; }
        .btn-green { background: #21a038; border: none; padding: 18px; border-radius: 15px; color: white; font-weight: bold; width: 100%; }
        #app-screen { background: #000; justify-content: flex-start; padding: 0; }
        .header { width: 100%; padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #1c1c1e; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen active">
    <div style="margin-bottom: 10px;">Введите пароль</div>
    <div class="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="numpad" id="pad"></div>
    <div onclick="forgotPassword()" style="margin-top: 30px; font-size: 13px; opacity: 0.7; cursor: pointer;">Не могу войти</div>
</div>

<div id="reg-screen" class="screen">
    <h2 style="color:#21a038">Регистрация</h2>
    <div style="width: 100%; max-width: 300px;">
        <input type="text" id="r-name" placeholder="Имя">
        <input type="tel" id="r-phone" placeholder="Номер телефона">
        <button class="btn-green" onclick="save()">СОЗДАТЬ АККАУНТ</button>
    </div>
</div>

<div id="app-screen" class="screen">
    <div class="header">
        <b id="u-name">Загрузка...</b>
        <span onclick="location.reload()">🚪</span>
    </div>
    <div style="padding: 25px; width: 100%;">
        <div style="background: #1c1c1e; padding: 25px; border-radius: 20px;">
            <div style="font-size: 12px; color: #8e8e93;">Баланс</div>
            <div id="u-bal" style="font-size: 32px; font-weight: bold; margin: 10px 0;">0 ₽</div>
        </div>
    </div>
    <div class="nav">
        <div style="color:#21a038">🏠<br>Главный</div>
        <div onclick="alert('Сканер готов')">🔳<br>Платежи</div>
    </div>
</div>

<script>
    firebase.initializeApp({databaseURL: "https://sbep-15509-default-rtdb.firebaseio.com"});
    const db = firebase.database();
    let currentPin = "";

    function drawPad() {
        const p = document.getElementById('pad');
        [1,2,3,4,5,6,7,8,9,'?',0,'⌫'].forEach(v => {
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = v;
            b.onclick = () => {
                if(v === '⌫') currentPin = currentPin.slice(0,-1);
                else if(currentPin.length < 5 && typeof v === 'number') currentPin += v;
                updateDots();
                if(currentPin.length === 5) check();
            };
            p.appendChild(b);
        });
    }

    function updateDots() {
        document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('active', i < currentPin.length));
    }

    async function check() {
        const s = await db.ref('users/'+currentPin).once('value');
        if(s.exists()) {
            showApp(s.val());
        } else {
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('reg-screen').classList.add('active');
        }
    }

    function forgotPassword() {
        currentPin = "";
        updateDots();
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('reg-screen').classList.add('active');
    }

    async function save() {
        const n = document.getElementById('r-name').value;
        const ph = document.getElementById('r-phone').value;
        if(!n || !ph) return alert("Заполни поля");
        const data = {name: n, phone: ph, bal: 15000};
        await db.ref('users/'+currentPin).set(data);
        showApp(data);
    }

    function showApp(data) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('app-screen').classList.add('active');
        document.getElementById('u-name').innerText = data.name;
        document.getElementById('u-bal').innerText = data.bal.toLocaleString() + " ₽";
    }

    drawPad();
</script>
</body>
</html>
